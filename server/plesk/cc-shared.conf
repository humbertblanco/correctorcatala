# http-context shared directives for the Corrector vhost on a Plesk box.
# Install at /etc/nginx/conf.d/cc-shared.conf and reload nginx.

limit_req_zone $binary_remote_addr zone=cc_lt:10m rate=30r/m;

map $http_origin $cc_cors_ok {
    default                                            "";
    "~^chrome-extension://[a-z]{32}$"                  $http_origin;
    "~^moz-extension://[0-9a-f-]{36}$"                 $http_origin;
    "~^https://corrector\.cat$"                        $http_origin;
}
