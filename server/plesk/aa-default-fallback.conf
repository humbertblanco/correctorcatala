# =============================================================================
# Default-server fallback per a hostnames sense match (Plesk-VPS).
#
# Problema: quan afegim cc-corrector.conf a /etc/nginx/conf.d/, el bloc del
# corrector passa a ser el "primer definit" per a la IP+port del servidor;
# com que cap altre server block té el flag `default_server`, nginx l'agafa
# com a catch-all per a hostnames que no coincideixen amb cap server_name
# (per exemple, el hostname de la màquina). Això trenca l'accés a vhosts
# Apache-only de Plesk i a la pàgina del panell.
#
# Fix: aquest fitxer es carrega ABANS de cc-corrector.conf (alfabèticament
# `aa-` < `cc-`) i té el flag `default_server` explícit, replicant
# byte-per-byte el comportament de /etc/nginx/plesk.conf.d/server.conf
# (proxy a 127.0.0.1:8880 / 7080).
#
# IMPORTANT: la ruta del certificat és la del Plesk (default cert).
# Si Plesk regenera el seu server.conf canviant el cert o el comportament,
# cal re-sincronitzar aquest fitxer (comparar amb
# /etc/nginx/plesk.conf.d/server.conf via diff).
# =============================================================================

server {
	listen "37.187.151.83:443" ssl default_server;
	listen "[2001:41d0:a:5753::]:443" ssl default_server;
	http2 on;

	ssl_certificate             "/usr/local/psa/var/certificates/scfjcnnp04rhc3gctnlqlz";
	ssl_certificate_key         "/usr/local/psa/var/certificates/scfjcnnp04rhc3gctnlqlz";
	client_max_body_size 2048m;

	proxy_read_timeout 600;
	proxy_send_timeout 600;

	proxy_max_temp_file_size 0;
	proxy_buffers 16 16k;
	proxy_buffer_size 32k;
	proxy_busy_buffers_size 32k;

	server_name _;

	location / {
		proxy_pass http://127.0.0.1:8880;
		proxy_redirect http://$host:8880 $scheme://$host;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-Http-Host $host:$server_port;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		access_log off;

		gzip on;
		gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript;
	}

	location ~ /(ws|websocket)(/|$) {
		proxy_pass http://127.0.0.1:8880;
		proxy_redirect off;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "Upgrade";
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-Http-Host $host:$server_port;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		access_log off;
	}

	underscores_in_headers on;
}

server {
	listen "37.187.151.83:80" default_server;

	location ^~ /plesk-site-preview/ {
		proxy_pass "http://127.0.0.1:8880";
		proxy_set_header Host               plesk-site-preview.local;
		proxy_set_header X-Real-IP          $remote_addr;
		proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto  $scheme;
		proxy_cookie_domain plesk-site-preview.local $host;
		access_log off;
	}

	location / {
		proxy_pass "http://127.0.0.1:7080";
		proxy_set_header Host            $ip_default_host;
		proxy_set_header X-Real-IP       $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	}
}

server {
	listen "[2001:41d0:a:5753::]:80" default_server;

	location ^~ /plesk-site-preview/ {
		proxy_pass "http://127.0.0.1:8880";
		proxy_set_header Host               plesk-site-preview.local;
		proxy_set_header X-Real-IP          $remote_addr;
		proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto  $scheme;
		proxy_cookie_domain plesk-site-preview.local $host;
		access_log off;
	}

	location / {
		proxy_pass "http://127.0.0.1:7080";
		proxy_set_header Host            $ip_default_host;
		proxy_set_header X-Real-IP       $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	}
}
